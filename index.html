<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Cyber Snakes & Ladders - Premium Neon Edition</title>
  <meta name="description" content="Play Snake and Ladders in a premium cyber-neon themed board game. Features local multiplayer, bots, 3D animated dice, synthesized SFX, and confetti celebrations.">
  
  <!-- Styling -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Background Confetti Canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Header Section -->
  <header>
    <div class="logo brand-font">CYBER SNAKES</div>
    <div class="controls-top" style="display: flex; align-items: center; gap: 15px;">
      <a href="ai-demo/index.html" class="btn" style="padding: 8px 14px; font-size: 0.85rem;">Test Neural Lab 🧪</a>
      <button class="btn btn-icon" id="sound-toggle" title="Toggle Sound">🔊</button>
    </div>
  </header>

  <!-- Main Workspace -->
  <main>
    
    <!-- Setup Screen (Displayed on Load) -->
    <div id="setup-screen" class="glass-panel">
      <h2 class="setup-title brand-font">GAME SETUP</h2>
      
      <!-- Select Player Count -->
      <div class="setup-section">
        <label>NUMBER OF PLAYERS</label>
        <div class="setup-number-players">
          <button class="player-count-btn active" data-count="2">2 Players</button>
          <button class="player-count-btn" data-count="3">3 Players</button>
          <button class="player-count-btn" data-count="4">4 Players</button>
        </div>
      </div>
      
      <!-- Player Roster Customizer -->
      <div class="setup-section">
        <label>CUSTOMIZE ROSTER & AVATARS</label>
        <div id="player-setup-list">
          <!-- Dynamically populated from JS -->
        </div>
      </div>
      
      <!-- Options -->
      <div class="setup-section" style="display: flex; gap: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <label class="switch">
            <input type="checkbox" id="exact-roll-toggle" checked>
            <span class="slider"></span>
          </label>
          <span style="font-size: 0.9rem; font-weight: 500;">Exact Roll to Win (Tile 100)</span>
        </div>
      </div>

      <!-- Play Trigger -->
      <button class="btn btn-primary" id="start-game-btn" style="width: 100%; padding: 14px; font-size: 1.1rem; margin-top: 10px;">
        Launch Game 🚀
      </button>
    </div>

    <!-- Gameplay Screen (Hidden on Load) -->
    <div id="play-screen" class="game-container hidden">
      
      <!-- Left Column: The 10x10 Board Grid -->
      <div class="board-column">
        <div class="board-wrapper" id="board-wrapper">
          <!-- SVG Overlay for Snakes and Ladders -->
          <svg id="board-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
            <!-- Drawn dynamically from JS -->
          </svg>
          
          <!-- Cells -->
          <div class="board-grid" id="board-grid">
            <!-- Rendered dynamically from JS -->
          </div>
          
          <!-- Tokens Container (Absolute overlay) -->
          <div id="tokens-container" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10;">
            <!-- Appended dynamically -->
          </div>
        </div>
      </div>

      <!-- Right Column: HUD controls, Dice, and History -->
      <div class="hud-column">
        
        <!-- Active Player Turn -->
        <div class="glass-panel turn-card">
          <h3 style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;">Active Turn</h3>
          <div class="turn-player-indicator">
            <div class="turn-avatar" id="current-player-avatar">🧙‍♂️</div>
            <div>
              <div class="turn-name" id="current-player-name">Player 1</div>
              <div class="turn-status" id="current-player-status">Your turn! Roll the dice.</div>
            </div>
          </div>
        </div>

        <!-- 3D Dice Roll Arena -->
        <div class="glass-panel dice-card">
          <h3 style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;">Dice Arena</h3>
          
          <div class="dice-container">
            <div class="dice-scene" id="dice-scene">
              <div class="dice-cube" id="dice-cube" data-face="1">
                <!-- Face 1 -->
                <div class="dice-face" style="transform: rotateY(0deg) translateZ(30px);">
                  <div class="dice-dot d4"></div>
                </div>
                <!-- Face 6 -->
                <div class="dice-face" style="transform: rotateY(180deg) translateZ(30px);">
                  <div class="dice-dot d1"></div>
                  <div class="dice-dot d2"></div>
                  <div class="dice-dot d3"></div>
                  <div class="dice-dot d5"></div>
                  <div class="dice-dot d6"></div>
                  <div class="dice-dot d7"></div>
                </div>
                <!-- Face 2 -->
                <div class="dice-face" style="transform: rotateY(90deg) translateZ(30px);">
                  <div class="dice-dot d1"></div>
                  <div class="dice-dot d7"></div>
                </div>
                <!-- Face 5 -->
                <div class="dice-face" style="transform: rotateY(-90deg) translateZ(30px);">
                  <div class="dice-dot d1"></div>
                  <div class="dice-dot d2"></div>
                  <div class="dice-dot d4"></div>
                  <div class="dice-dot d6"></div>
                  <div class="dice-dot d7"></div>
                </div>
                <!-- Face 3 -->
                <div class="dice-face" style="transform: rotateX(90deg) translateZ(30px);">
                  <div class="dice-dot d1"></div>
                  <div class="dice-dot d4"></div>
                  <div class="dice-dot d7"></div>
                </div>
                <!-- Face 4 -->
                <div class="dice-face" style="transform: rotateX(-90deg) translateZ(30px);">
                  <div class="dice-dot d1"></div>
                  <div class="dice-dot d2"></div>
                  <div class="dice-dot d6"></div>
                  <div class="dice-dot d7"></div>
                </div>
              </div>
            </div>
          </div>
          
          <button class="btn btn-primary" id="roll-btn" style="width: 100%; max-width: 220px; font-size: 1rem; padding: 12px 0;">
            Roll Dice
          </button>
        </div>

        <!-- Realtime Action History Log -->
        <div class="glass-panel history-card">
          <h3 class="brand-font">ACTION LOG <span style="font-size:0.6rem; background:rgba(255,255,255,0.06); padding: 2px 6px; border-radius:10px;">LIVE</span></h3>
          <div class="history-log" id="history-log">
            <!-- Population through code -->
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Victory Overlay Modal -->
  <div class="modal-overlay" id="victory-modal">
    <div class="glass-panel modal-content">
      <div class="winner-avatar" id="winner-avatar">🏆</div>
      <h2 class="brand-font">VICTORY achieved!</h2>
      <p style="font-size: 1.1rem; margin-bottom: 10px;">
        All hail <span id="winner-name" style="font-weight: 800;">Player 1</span>, sovereign conqueror of Square 100!
      </p>
      
      <!-- Stats Summary -->
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-val" id="winner-rolls">12</div>
          <div class="stat-label">Total Rolls</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="winner-climbs">2</div>
          <div class="stat-label">Ladders Climbed</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="winner-bites">1</div>
          <div class="stat-label">Snake Bites</div>
        </div>
      </div>
      
      <button class="btn btn-secondary" id="restart-btn" style="padding: 12px 30px; font-size: 1rem; width: 100%; max-width: 200px;">
        Play Again 🔄
      </button>
    </div>
  </div>

  <!-- Toast Feed System -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Code Modules -->
  <script src="game.js"></script>
  <script src="sound.js"></script>
  <script src="ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const game = new SnakeAndLaddersGame();
      const ui = new UIController(game, sound);
    });
  </script>
</body>
</html>
